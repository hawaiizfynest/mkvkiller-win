name: Build MKVKiller

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download ffmpeg and build
        shell: pwsh
        run: ./build.ps1

      - name: Package release archive
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath MKVKiller-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MKVKiller-win-x64
          path: MKVKiller-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MKVKiller-win-x64.zip
          generate_release_notes: true
